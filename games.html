<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Games</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #fffaf0;
        --night: #111827;
        --blue: #4cc9f0;
        --green: #72ef92;
        --pink: #ff70a6;
        --gold: #ffd166;
        --panel: rgba(11, 18, 32, 0.84);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          radial-gradient(circle at 16% 20%, rgba(76, 201, 240, 0.32), transparent 18rem),
          radial-gradient(circle at 85% 75%, rgba(255, 112, 166, 0.26), transparent 18rem),
          linear-gradient(135deg, #111827 0%, #221338 55%, #102018 100%);
        background-size: 40px 40px, 40px 40px, auto, auto, auto;
      }

      .back {
        position: fixed;
        top: clamp(1rem, 3vw, 2rem);
        left: clamp(1rem, 3vw, 2rem);
        z-index: 4;
      }

      main {
        width: min(94vw, 1160px);
        margin: 0 auto;
        padding: clamp(5.5rem, 10vw, 7rem) 0 clamp(1rem, 3vw, 2rem);
        display: grid;
        gap: 1rem;
      }

      h1,
      h2 {
        margin: 0;
        font-family: Impact, Haettenschweiler, "Arial Black", system-ui, sans-serif;
        line-height: 0.9;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(4.5rem, 16vw, 12rem);
        text-shadow:
          0.035em 0.035em 0 var(--pink),
          -0.035em -0.025em 0 var(--blue);
      }

      h2 {
        color: var(--gold);
        font-size: clamp(2rem, 5vw, 4rem);
      }

      p {
        margin: 0;
        font-weight: 850;
        line-height: 1.45;
      }

      button,
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.8rem;
        color: #111827;
        background: var(--gold);
        border: 3px solid var(--ink);
        border-radius: 999px;
        padding: 0.7rem 1rem;
        font-family: "Arial Black", Impact, system-ui, sans-serif;
        font-size: 0.95rem;
        letter-spacing: 0;
        text-decoration: none;
        text-transform: uppercase;
        box-shadow: 0 0.45rem 0 rgba(0, 0, 0, 0.36);
        cursor: pointer;
      }

      button:hover,
      button:focus-visible,
      a:hover,
      a:focus-visible {
        transform: translateY(-0.1rem);
      }

      .intro {
        max-width: 58rem;
        font-size: clamp(1.1rem, 2vw, 1.45rem);
      }

      .games {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
      }

      .game {
        display: grid;
        align-content: start;
        gap: 1rem;
        min-height: 25rem;
        padding: clamp(1rem, 2vw, 1.25rem);
        border: 3px solid rgba(255, 255, 255, 0.86);
        background: var(--panel);
        box-shadow: 0 0.8rem 0 rgba(0, 0, 0, 0.28);
      }

      .status {
        min-height: 1.8rem;
        color: var(--green);
        font-weight: 950;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
        width: min(100%, 20rem);
      }

      .cell {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 0;
        background: var(--ink);
        color: #111827;
        font-size: clamp(2.2rem, 7vw, 4.5rem);
        box-shadow: 0 0.28rem 0 rgba(0, 0, 0, 0.42);
      }

      .target-zone {
        position: relative;
        height: 16rem;
        border: 3px solid rgba(255, 255, 255, 0.75);
        background:
          radial-gradient(circle, rgba(255, 255, 255, 0.12) 1px, transparent 2px),
          rgba(255, 255, 255, 0.05);
        background-size: 22px 22px;
        overflow: hidden;
      }

      .target {
        position: absolute;
        left: 42%;
        top: 38%;
        width: 4.2rem;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--pink);
        color: var(--ink);
      }

      .reaction-pad {
        min-height: 11rem;
        border-radius: 0;
        color: var(--ink);
        background: #263348;
        font-size: clamp(1rem, 2vw, 1.5rem);
      }

      .reaction-pad.ready {
        background: var(--green);
        color: #111827;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
      }

      @media (max-width: 980px) {
        .games {
          grid-template-columns: 1fr;
        }

        .game {
          min-height: unset;
        }
      }
    </style>
  </head>
  <body>
    <a class="back" href="index.html">Back</a>
    <main>
      <section>
        <h1>Games</h1>
        <p class="intro">
          A mini arcade for quick fun: tic-tac-toe, target clicking, and a reaction challenge.
        </p>
      </section>

      <section class="games" aria-label="Mini games">
        <article class="game" aria-labelledby="ttt-title">
          <h2 id="ttt-title">Tic tac toe</h2>
          <p class="status" id="ttt-status">X goes first.</p>
          <div class="board" aria-label="Tic tac toe board"></div>
          <div class="controls">
            <button type="button" id="ttt-reset">Reset</button>
          </div>
        </article>

        <article class="game" aria-labelledby="target-title">
          <h2 id="target-title">Target rush</h2>
          <p class="status" id="target-score">Score: 0</p>
          <div class="target-zone">
            <button type="button" class="target" aria-label="Click target">Hit</button>
          </div>
          <p>Click the target and it jumps somewhere new.</p>
        </article>

        <article class="game" aria-labelledby="react-title">
          <h2 id="react-title">Reaction</h2>
          <p class="status" id="react-status">Press start, wait for green, then click.</p>
          <button type="button" class="reaction-pad">Start</button>
          <p>Best time: <strong id="best-time">none yet</strong></p>
        </article>
      </section>
    </main>
    <script>
      const board = document.querySelector(".board");
      const tttStatus = document.querySelector("#ttt-status");
      const wins = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6]
      ];
      let squares = Array(9).fill("");
      let turn = "X";
      let gameOver = false;

      function winner() {
        for (const [a, b, c] of wins) {
          if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
            return squares[a];
          }
        }

        return squares.includes("") ? "" : "Tie";
      }

      function renderBoard() {
        board.innerHTML = "";
        squares.forEach((value, index) => {
          const cell = document.createElement("button");
          cell.className = "cell";
          cell.type = "button";
          cell.textContent = value;
          cell.setAttribute("aria-label", value ? `Square ${index + 1}: ${value}` : `Square ${index + 1}`);
          cell.addEventListener("click", () => {
            if (gameOver || squares[index]) {
              return;
            }

            squares[index] = turn;
            const result = winner();
            if (result) {
              gameOver = true;
              tttStatus.textContent = result === "Tie" ? "Tie game." : `${result} wins.`;
            } else {
              turn = turn === "X" ? "O" : "X";
              tttStatus.textContent = `${turn}'s turn.`;
            }

            renderBoard();
          });
          board.append(cell);
        });
      }

      document.querySelector("#ttt-reset").addEventListener("click", () => {
        squares = Array(9).fill("");
        turn = "X";
        gameOver = false;
        tttStatus.textContent = "X goes first.";
        renderBoard();
      });

      renderBoard();

      const target = document.querySelector(".target");
      const targetScore = document.querySelector("#target-score");
      let score = 0;

      target.addEventListener("click", () => {
        score += 1;
        targetScore.textContent = `Score: ${score}`;
        target.style.left = `${Math.random() * 72 + 5}%`;
        target.style.top = `${Math.random() * 62 + 6}%`;
      });

      const reactionPad = document.querySelector(".reaction-pad");
      const reactionStatus = document.querySelector("#react-status");
      const bestTime = document.querySelector("#best-time");
      let reactionTimer;
      let readyAt = 0;
      let waiting = false;
      let best = Infinity;

      reactionPad.addEventListener("click", () => {
        if (reactionPad.classList.contains("ready")) {
          const time = Date.now() - readyAt;
          best = Math.min(best, time);
          reactionStatus.textContent = `Nice. ${time} ms.`;
          bestTime.textContent = `${best} ms`;
          reactionPad.textContent = "Start";
          reactionPad.classList.remove("ready");
          waiting = false;
          return;
        }

        if (waiting) {
          window.clearTimeout(reactionTimer);
          reactionStatus.textContent = "Too early. Try again.";
          reactionPad.textContent = "Start";
          waiting = false;
          return;
        }

        waiting = true;
        reactionStatus.textContent = "Wait for green...";
        reactionPad.textContent = "Wait";
        reactionTimer = window.setTimeout(() => {
          readyAt = Date.now();
          reactionPad.classList.add("ready");
          reactionPad.textContent = "Click now";
          reactionStatus.textContent = "Click now.";
        }, 900 + Math.random() * 1800);
      });
    </script>
  </body>
</html>
