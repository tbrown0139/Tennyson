<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TENNYSON</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #fff7e8;
        --gold: #ffd166;
        --aqua: #4ecdc4;
        --rose: #ff5c8a;
        --night: #141319;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: Impact, Haettenschweiler, "Arial Black", system-ui, sans-serif;
        background:
          radial-gradient(circle at 18% 24%, rgba(255, 209, 102, 0.36), transparent 18rem),
          radial-gradient(circle at 83% 30%, rgba(78, 205, 196, 0.32), transparent 16rem),
          radial-gradient(circle at 55% 82%, rgba(255, 92, 138, 0.28), transparent 20rem),
          linear-gradient(135deg, #10131c 0%, var(--night) 44%, #211626 100%);
      }

      main {
        width: min(94vw, 1800px);
        padding: clamp(1rem, 3vw, 3rem);
        text-align: center;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        cursor: pointer;
        font-size: clamp(4.6rem, 20vw, 21rem);
        line-height: 0.82;
        letter-spacing: 0;
        text-transform: uppercase;
        text-shadow:
          0.035em 0.035em 0 var(--rose),
          -0.035em -0.025em 0 var(--aqua),
          0 0.08em 0.18em rgba(0, 0, 0, 0.48);
        transform: skew(-4deg) rotate(-1deg);
        user-select: none;
      }

      h1:focus-visible {
        outline: 0.08em solid var(--gold);
        outline-offset: 0.08em;
      }

      .spark {
        position: fixed;
        left: 0;
        top: 0;
        width: 0.8rem;
        height: 0.8rem;
        border-radius: 50%;
        pointer-events: none;
        transform: translate(-50%, -50%);
        animation: firework 760ms ease-out forwards;
        box-shadow:
          0 -4.6rem 0 var(--gold),
          3.3rem -3.3rem 0 var(--aqua),
          4.6rem 0 0 var(--rose),
          3.3rem 3.3rem 0 #ffffff,
          0 4.6rem 0 var(--gold),
          -3.3rem 3.3rem 0 var(--aqua),
          -4.6rem 0 0 var(--rose),
          -3.3rem -3.3rem 0 #ffffff;
      }

      @keyframes firework {
        0% {
          opacity: 1;
          filter: blur(0);
          transform: translate(-50%, -50%) scale(0.15) rotate(0deg);
        }

        70% {
          opacity: 1;
        }

        100% {
          opacity: 0;
          filter: blur(0.08rem);
          transform: translate(-50%, -50%) scale(1.15) rotate(35deg);
        }
      }

      .links {
        position: fixed;
        right: clamp(1rem, 3vw, 2rem);
        bottom: clamp(1rem, 3vw, 2rem);
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 0.75rem;
      }

      a {
        color: #171717;
        background: var(--gold);
        border: 3px solid #fff7e8;
        border-radius: 999px;
        padding: 0.8rem 1.1rem;
        font-family: "Arial Black", Impact, system-ui, sans-serif;
        font-size: clamp(0.9rem, 2.4vw, 1.2rem);
        letter-spacing: 0;
        text-decoration: none;
        text-transform: uppercase;
        box-shadow: 0 0.55rem 0 rgba(0, 0, 0, 0.35);
      }

      a:hover,
      a:focus-visible {
        transform: translateY(-0.12rem);
      }

      h1::selection {
        color: #151515;
        background: var(--gold);
      }

      .burst {
        position: fixed;
        inset: -20vmax;
        z-index: -1;
        background:
          repeating-conic-gradient(
            from -8deg,
            rgba(255, 255, 255, 0.08) 0deg 5deg,
            transparent 5deg 13deg
          );
        animation: spin 38s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(1turn);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .burst {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="burst" aria-hidden="true"></div>
    <main>
      <h1 tabindex="0" aria-label="TENNYSON. Click for fireworks.">TENNYSON</h1>
    </main>
    <nav class="links" aria-label="Site pages">
      <a href="doge.html">About me</a>
      <a href="secret.html">Secret</a>
      <a href="knovon.html">Knovon</a>
      <a href="games.html">Games</a>
    </nav>
    <script>
      const title = document.querySelector("h1");

      function launchFirework(x, y) {
        for (let i = 0; i < 4; i += 1) {
          const spark = document.createElement("span");
          const jitterX = (Math.random() - 0.5) * 80;
          const jitterY = (Math.random() - 0.5) * 80;

          spark.className = "spark";
          spark.style.left = `${x + jitterX}px`;
          spark.style.top = `${y + jitterY}px`;
          spark.style.animationDelay = `${i * 80}ms`;
          document.body.append(spark);
          spark.addEventListener("animationend", () => spark.remove());
        }
      }

      title.addEventListener("click", (event) => {
        launchFirework(event.clientX, event.clientY);
      });

      title.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }

        event.preventDefault();
        const box = title.getBoundingClientRect();
        launchFirework(box.left + box.width / 2, box.top + box.height / 2);
      });
    </script>
  </body>
</html>
