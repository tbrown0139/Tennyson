<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secret Cat Page</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #fff9ef;
        --night: #101622;
        --blue: #58c7ff;
        --pink: #ff6b9d;
        --gold: #ffd166;
        --green: #66e89c;
        --fur: #d28a48;
        --fur-dark: #a95e33;
        --cat-bg: #78ddff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(1rem, 3vw, 2rem);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(88, 199, 255, 0.32), transparent 18rem),
          radial-gradient(circle at 83% 79%, rgba(255, 107, 157, 0.24), transparent 18rem),
          linear-gradient(135deg, #101622 0%, #19142c 55%, #152018 100%);
        overflow-x: hidden;
      }

      .top-links {
        position: fixed;
        top: clamp(1rem, 3vw, 2rem);
        left: clamp(1rem, 3vw, 2rem);
        z-index: 3;
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
      }

      .top-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.7rem;
        color: #111827;
        background: var(--gold);
        border: 3px solid var(--ink);
        border-radius: 999px;
        padding: 0.72rem 1rem;
        font-family: "Arial Black", Impact, system-ui, sans-serif;
        font-size: 0.9rem;
        letter-spacing: 0;
        text-decoration: none;
        text-transform: uppercase;
        box-shadow: 0 0.45rem 0 rgba(0, 0, 0, 0.35);
      }

      main {
        width: min(94vw, 980px);
        padding-top: 4rem;
      }

      .login,
      .secret {
        border: 3px solid rgba(255, 255, 255, 0.88);
        background: rgba(9, 14, 26, 0.82);
        box-shadow: 0 1rem 0 rgba(0, 0, 0, 0.28);
      }

      .login {
        width: min(100%, 560px);
        margin: 0 auto;
        padding: clamp(1.1rem, 4vw, 2rem);
      }

      h1,
      h2 {
        margin: 0;
        font-family: Impact, Haettenschweiler, "Arial Black", system-ui, sans-serif;
        line-height: 0.9;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(3rem, 9vw, 6.4rem);
        text-shadow:
          0.04em 0.04em 0 var(--pink),
          -0.035em -0.02em 0 var(--blue);
      }

      .login p,
      .secret p {
        margin: 1rem 0 0;
        font-size: clamp(1rem, 2vw, 1.2rem);
        font-weight: 750;
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 0.8rem;
        margin-top: 1.3rem;
      }

      label {
        font-weight: 900;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 3.3rem;
        color: #111827;
        background: var(--ink);
        border: 3px solid var(--blue);
        border-radius: 0;
        padding: 0.75rem 0.9rem;
        font: inherit;
        font-size: 1.1rem;
        font-weight: 800;
      }

      button {
        width: fit-content;
        min-height: 3.2rem;
        color: #111827;
        background: var(--green);
        border: 3px solid var(--ink);
        border-radius: 999px;
        padding: 0.75rem 1.2rem;
        font-family: "Arial Black", Impact, system-ui, sans-serif;
        font-size: 1rem;
        letter-spacing: 0;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0.45rem 0 rgba(0, 0, 0, 0.35);
      }

      button:hover,
      button:focus-visible,
      .top-links a:hover,
      .top-links a:focus-visible {
        transform: translateY(-0.1rem);
      }

      .error {
        min-height: 1.5rem;
        color: #ff9bb7;
        font-weight: 900;
      }

      .secret {
        display: none;
        gap: clamp(1rem, 3vw, 2rem);
        grid-template-columns: minmax(0, 1fr) minmax(260px, 0.9fr);
        align-items: center;
        padding: clamp(1rem, 3vw, 2rem);
      }

      .unlocked .login {
        display: none;
      }

      .unlocked .secret {
        display: grid;
      }

      h2 {
        font-size: clamp(2.7rem, 7vw, 6rem);
        color: var(--gold);
      }

      .cat-frame {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 410px;
        perspective: 900px;
      }

      .cat-card {
        position: relative;
        width: min(82vw, 360px);
        aspect-ratio: 1 / 1;
        border: 0.7rem solid var(--ink);
        background:
          radial-gradient(circle at 50% 66%, #f7d8a7 0 15%, transparent 16%),
          radial-gradient(circle at 36% 43%, #ffdca9 0 7%, transparent 8%),
          radial-gradient(circle at 64% 43%, #ffdca9 0 7%, transparent 8%),
          radial-gradient(circle at 50% 46%, var(--fur) 0 36%, var(--fur-dark) 37% 48%, transparent 49%),
          linear-gradient(145deg, var(--cat-bg) 0%, #ffe06b 100%);
        box-shadow: 0 1.4rem 3rem rgba(0, 0, 0, 0.42);
        transform: rotateX(var(--tilt-y, 0deg)) rotateY(var(--tilt-x, 0deg));
        transition: transform 120ms ease-out;
        cursor: pointer;
      }

      .cat-card:focus-visible {
        outline: 0.32rem solid var(--gold);
        outline-offset: 0.28rem;
      }

      .cat-card::before,
      .cat-card::after {
        content: "";
        position: absolute;
        top: 22%;
        width: 26%;
        aspect-ratio: 1;
        background: var(--fur-dark);
        border: 0.25rem solid #5e321c;
        transform: rotate(45deg);
        z-index: 0;
      }

      .cat-card::before {
        left: 19%;
      }

      .cat-card::after {
        right: 19%;
      }

      .face {
        position: absolute;
        inset: 25% 15% 13%;
        border-radius: 50% 50% 42% 42%;
        background: var(--fur);
        border: 0.28rem solid #5e321c;
        z-index: 1;
      }

      .eye {
        position: absolute;
        top: 38%;
        width: 18%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #fff8db;
        border: 0.18rem solid #30180d;
        overflow: hidden;
      }

      .eye.left {
        left: 25%;
      }

      .eye.right {
        right: 25%;
      }

      .pupil {
        position: absolute;
        left: calc(50% + var(--eye-x, 0px));
        top: calc(50% + var(--eye-y, 0px));
        width: 42%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #101010;
        transform: translate(-50%, -50%);
      }

      .nose {
        position: absolute;
        left: 50%;
        top: 56%;
        width: 10%;
        aspect-ratio: 1.15 / 1;
        border-radius: 48% 48% 60% 60%;
        background: #4b2418;
        transform: translateX(-50%);
      }

      .mouth {
        position: absolute;
        left: 50%;
        top: 65%;
        width: 22%;
        height: 10%;
        border-bottom: 0.25rem solid #4b2418;
        border-radius: 0 0 999px 999px;
        transform: translateX(-50%);
      }

      .tongue {
        position: absolute;
        left: 50%;
        top: 71%;
        width: 13%;
        height: 0;
        border-radius: 0 0 999px 999px;
        background: #ff6b9d;
        border: 0 solid #4b2418;
        transform: translateX(-50%);
        transition: height 140ms ease-out, border-width 140ms ease-out;
      }

      .cat-card.tongue-out .tongue {
        height: 15%;
        border-width: 0 0.16rem 0.16rem;
      }

      .cat-hat,
      .cat-glasses,
      .cat-cape,
      .cat-crown,
      .cat-bow,
      .cat-collar {
        display: none;
        position: absolute;
        pointer-events: none;
        z-index: 3;
      }

      .cat-hat {
        left: 50%;
        top: 9%;
        width: 48%;
        height: 20%;
        border-radius: 999px 999px 18% 18%;
        background: var(--gold);
        border: 0.25rem solid #4b2418;
        transform: translateX(-50%) rotate(-5deg);
      }

      .cat-hat::before {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 72%;
        width: 52%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #ff6b9d;
        border: 0.2rem solid #4b2418;
        transform: translateX(-50%);
      }

      .cat-glasses {
        left: 25%;
        top: 39%;
        width: 50%;
        height: 14%;
      }

      .cat-glasses::before,
      .cat-glasses::after {
        content: "";
        position: absolute;
        top: 0;
        width: 37%;
        aspect-ratio: 1.4 / 1;
        border-radius: 0.7rem;
        background: rgba(12, 18, 28, 0.92);
        border: 0.2rem solid #4b2418;
      }

      .cat-glasses::before {
        left: 0;
      }

      .cat-glasses::after {
        right: 0;
      }

      .cat-cape {
        left: 50%;
        bottom: 2%;
        width: 52%;
        height: 34%;
        border-radius: 12% 12% 50% 50%;
        background: #5cc8ff;
        border: 0.25rem solid #123048;
        transform: translateX(-50%);
        z-index: 0;
      }

      .cat-crown {
        left: 50%;
        top: 5%;
        width: 42%;
        height: 18%;
        background:
          linear-gradient(135deg, transparent 0 20%, #ffd166 21% 42%, transparent 43% 57%, #ffd166 58% 79%, transparent 80%),
          linear-gradient(#ffd166, #ffd166);
        background-size: 100% 70%, 100% 36%;
        background-position: top, bottom;
        background-repeat: no-repeat;
        filter: drop-shadow(0 0.16rem 0 #4b2418);
        transform: translateX(-50%) rotate(4deg);
      }

      .cat-bow {
        left: 50%;
        top: 69%;
        width: 25%;
        height: 13%;
        transform: translateX(-50%);
      }

      .cat-bow::before,
      .cat-bow::after {
        content: "";
        position: absolute;
        top: 10%;
        width: 45%;
        height: 75%;
        border-radius: 50% 18% 50% 18%;
        background: var(--pink);
        border: 0.17rem solid #4b2418;
      }

      .cat-bow::before {
        left: 0;
        transform: rotate(18deg);
      }

      .cat-bow::after {
        right: 0;
        transform: rotate(-18deg);
      }

      .cat-collar {
        left: 50%;
        top: 72%;
        width: 44%;
        height: 8%;
        border-radius: 999px;
        background: var(--green);
        border: 0.18rem solid #4b2418;
        transform: translateX(-50%);
      }

      .cat-collar::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 52%;
        width: 17%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--gold);
        border: 0.14rem solid #4b2418;
        transform: translateX(-50%);
      }

      .cat-card.has-hat .cat-hat,
      .cat-card.has-glasses .cat-glasses,
      .cat-card.has-cape .cat-cape,
      .cat-card.has-crown .cat-crown,
      .cat-card.has-bow .cat-bow,
      .cat-card.has-collar .cat-collar {
        display: block;
      }

      .made-by {
        position: absolute;
        right: 0.45rem;
        bottom: 0.45rem;
        z-index: 5;
        padding: 0.32rem 0.45rem;
        color: #111827;
        background: rgba(255, 249, 239, 0.92);
        border: 2px solid #111827;
        font-family: "Arial Black", Impact, system-ui, sans-serif;
        font-size: clamp(0.62rem, 2vw, 0.84rem);
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .whisker {
        position: absolute;
        top: 59%;
        width: 27%;
        height: 0.18rem;
        background: #4b2418;
      }

      .whisker.left {
        left: 4%;
      }

      .whisker.right {
        right: 4%;
      }

      .whisker.top {
        margin-top: -0.6rem;
        transform: rotate(10deg);
      }

      .whisker.bottom {
        margin-top: 0.6rem;
        transform: rotate(-10deg);
      }

      .hint {
        position: absolute;
        bottom: -0.2rem;
        right: 0;
        left: 0;
        margin: 0 auto;
        width: fit-content;
        padding: 0.45rem 0.7rem;
        color: #111827;
        background: var(--ink);
        border: 2px solid #111827;
        font-weight: 900;
        text-transform: uppercase;
      }

      .upgrades {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
        align-items: center;
        margin-top: 1rem;
      }

      .upgrades h3 {
        width: 100%;
        margin: 0;
        font-family: Impact, Haettenschweiler, "Arial Black", system-ui, sans-serif;
        font-size: clamp(1.8rem, 4vw, 3rem);
        line-height: 0.95;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .swatch {
        width: 3.1rem;
        min-height: 3.1rem;
        padding: 0;
        border-radius: 50%;
        background: var(--swatch);
      }

      .save-status {
        width: 100%;
        min-height: 1.5rem;
        margin: 0;
        color: var(--green);
        font-size: 0.95rem;
        font-weight: 900;
      }

      @media (max-width: 820px) {
        .secret {
          grid-template-columns: 1fr;
        }

        .cat-frame {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="top-links" aria-label="Secret page links">
      <a href="index.html">Back</a>
      <a href="avatar.html">Avatar</a>
    </nav>
    <main>
      <section class="login" aria-labelledby="secret-title">
        <h1 id="secret-title">Secret page</h1>
        <p>Enter the secret password to unlock the surprise.</p>
        <form>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password">
          <button type="submit">Unlock</button>
          <div class="error" role="status" aria-live="polite"></div>
        </form>
      </section>

      <section class="secret" aria-labelledby="cat-title">
        <div>
          <h2 id="cat-title">You found the cat</h2>
          <div class="upgrades" aria-label="Cat upgrades">
            <h3>Cat upgrades</h3>
            <button type="button" data-upgrade="hat">Hat</button>
            <button type="button" data-upgrade="crown">Crown</button>
            <button type="button" data-upgrade="glasses">Sunglasses</button>
            <button type="button" data-upgrade="cape">Cape</button>
            <button type="button" data-upgrade="bow">Bow</button>
            <button type="button" data-upgrade="collar">Collar</button>
            <button class="swatch" style="--swatch: #d28a48" type="button" data-fur="#d28a48" data-fur-dark="#a95e33" aria-label="Orange fur"></button>
            <button class="swatch" style="--swatch: #8b8f98" type="button" data-fur="#8b8f98" data-fur-dark="#535761" aria-label="Gray fur"></button>
            <button class="swatch" style="--swatch: #f1efe8" type="button" data-fur="#f1efe8" data-fur-dark="#c6beb0" aria-label="White fur"></button>
            <button class="swatch" style="--swatch: #58c7ff" type="button" data-bg="#58c7ff" aria-label="Blue background"></button>
            <button class="swatch" style="--swatch: #ff6b9d" type="button" data-bg="#ff6b9d" aria-label="Pink background"></button>
            <button class="swatch" style="--swatch: #66e89c" type="button" data-bg="#66e89c" aria-label="Green background"></button>
            <button type="button" data-save="cat">Screenshot/share</button>
            <button type="button" data-upgrade="reset">Reset</button>
            <p class="save-status" aria-live="polite"></p>
          </div>
        </div>
        <div class="cat-frame" aria-label="Interactive cat illustration">
          <div class="cat-card" tabindex="0" role="button" aria-label="Cat. Click to make it stick its tongue out.">
            <span class="cat-cape"></span>
            <span class="cat-hat"></span>
            <span class="cat-crown"></span>
            <span class="cat-glasses"></span>
            <span class="cat-bow"></span>
            <span class="cat-collar"></span>
            <div class="face">
              <div class="eye left"><span class="pupil"></span></div>
              <div class="eye right"><span class="pupil"></span></div>
              <span class="nose"></span>
              <span class="mouth"></span>
              <span class="tongue"></span>
              <span class="whisker left top"></span>
              <span class="whisker left bottom"></span>
              <span class="whisker right top"></span>
              <span class="whisker right bottom"></span>
            </div>
            <span class="made-by">Made by Tennyson</span>
          </div>
          <p class="hint">Click the cat</p>
        </div>
      </section>
    </main>
    <script>
      const page = document.body;
      const form = document.querySelector("form");
      const input = document.querySelector("#password");
      const error = document.querySelector(".error");
      const cat = document.querySelector(".cat-card");
      const saveStatus = document.querySelector(".save-status");
      let tongueTimer;

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        if (input.value.trim().toLowerCase() === "cat") {
          page.classList.add("unlocked");
          error.textContent = "";
          return;
        }

        error.textContent = "That is not the secret password.";
        input.select();
      });

      window.addEventListener("pointermove", (event) => {
        if (!page.classList.contains("unlocked")) {
          return;
        }

        const box = cat.getBoundingClientRect();
        const centerX = box.left + box.width / 2;
        const centerY = box.top + box.height / 2;
        const x = (event.clientX - centerX) / box.width;
        const y = (event.clientY - centerY) / box.height;
        const eyeX = Math.max(-8, Math.min(8, x * 18));
        const eyeY = Math.max(-7, Math.min(7, y * 18));

        cat.style.setProperty("--tilt-x", `${Math.max(-10, Math.min(10, x * 16))}deg`);
        cat.style.setProperty("--tilt-y", `${Math.max(-8, Math.min(8, y * -12))}deg`);
        cat.style.setProperty("--eye-x", `${eyeX}px`);
        cat.style.setProperty("--eye-y", `${eyeY}px`);
      });

      function hideTongue() {
        cat.classList.remove("tongue-out");
        window.clearTimeout(tongueTimer);
      }

      function toggleTongue() {
        if (cat.classList.contains("tongue-out")) {
          hideTongue();
          return;
        }

        cat.classList.add("tongue-out");
        window.clearTimeout(tongueTimer);
        tongueTimer = window.setTimeout(hideTongue, 900);
      }

      cat.addEventListener("click", toggleTongue);
      cat.addEventListener("mouseleave", hideTongue);
      cat.addEventListener("blur", hideTongue);

      cat.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }

        event.preventDefault();
        toggleTongue();
      });

      document.querySelectorAll("[data-upgrade]").forEach((button) => {
        button.addEventListener("click", () => {
          const upgrade = button.dataset.upgrade;

          if (upgrade === "reset") {
            cat.classList.remove("has-hat", "has-glasses", "has-cape", "has-crown", "has-bow", "has-collar");
            return;
          }

          cat.classList.toggle(`has-${upgrade}`);
        });
      });

      document.querySelectorAll("[data-fur]").forEach((button) => {
        button.addEventListener("click", () => {
          page.style.setProperty("--fur", button.dataset.fur);
          page.style.setProperty("--fur-dark", button.dataset.furDark);
        });
      });

      document.querySelectorAll("[data-bg]").forEach((button) => {
        button.addEventListener("click", () => {
          page.style.setProperty("--cat-bg", button.dataset.bg);
        });
      });

      function roundedRect(context, x, y, width, height, radius) {
        context.beginPath();
        context.moveTo(x + radius, y);
        context.lineTo(x + width - radius, y);
        context.quadraticCurveTo(x + width, y, x + width, y + radius);
        context.lineTo(x + width, y + height - radius);
        context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        context.lineTo(x + radius, y + height);
        context.quadraticCurveTo(x, y + height, x, y + height - radius);
        context.lineTo(x, y + radius);
        context.quadraticCurveTo(x, y, x + radius, y);
        context.closePath();
      }

      function drawCatPicture() {
        const styles = getComputedStyle(page);
        const fur = styles.getPropertyValue("--fur").trim() || "#d28a48";
        const furDark = styles.getPropertyValue("--fur-dark").trim() || "#a95e33";
        const catBg = styles.getPropertyValue("--cat-bg").trim() || "#78ddff";
        const canvas = document.createElement("canvas");
        const size = 1200;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, catBg);
        gradient.addColorStop(1, "#ffe06b");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = furDark;
        ctx.strokeStyle = "#5e321c";
        ctx.lineWidth = 18;
        ctx.save();
        ctx.translate(390, 315);
        ctx.rotate(Math.PI / 4);
        ctx.fillRect(-80, -80, 160, 160);
        ctx.strokeRect(-80, -80, 160, 160);
        ctx.restore();
        ctx.save();
        ctx.translate(810, 315);
        ctx.rotate(Math.PI / 4);
        ctx.fillRect(-80, -80, 160, 160);
        ctx.strokeRect(-80, -80, 160, 160);
        ctx.restore();

        if (cat.classList.contains("has-cape")) {
          ctx.fillStyle = "#5cc8ff";
          ctx.strokeStyle = "#123048";
          roundedRect(ctx, 340, 670, 520, 330, 70);
          ctx.fill();
          ctx.stroke();
        }

        ctx.fillStyle = fur;
        ctx.strokeStyle = "#5e321c";
        ctx.lineWidth = 20;
        roundedRect(ctx, 300, 300, 600, 570, 250);
        ctx.fill();
        ctx.stroke();

        if (cat.classList.contains("has-hat")) {
          ctx.fillStyle = "#ffd166";
          ctx.strokeStyle = "#4b2418";
          ctx.lineWidth = 16;
          roundedRect(ctx, 380, 130, 440, 150, 70);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(600, 110, 75, 0, Math.PI * 2);
          ctx.fillStyle = "#ff6b9d";
          ctx.fill();
          ctx.stroke();
        }

        if (cat.classList.contains("has-crown")) {
          ctx.fillStyle = "#ffd166";
          ctx.strokeStyle = "#4b2418";
          ctx.lineWidth = 14;
          ctx.beginPath();
          ctx.moveTo(390, 250);
          ctx.lineTo(465, 120);
          ctx.lineTo(540, 250);
          ctx.lineTo(600, 120);
          ctx.lineTo(660, 250);
          ctx.lineTo(735, 120);
          ctx.lineTo(810, 250);
          ctx.lineTo(810, 320);
          ctx.lineTo(390, 320);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
        }

        ctx.fillStyle = "#fff8db";
        ctx.strokeStyle = "#30180d";
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.arc(480, 520, 58, 0, Math.PI * 2);
        ctx.arc(720, 520, 58, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#101010";
        ctx.beginPath();
        ctx.arc(480, 520, 24, 0, Math.PI * 2);
        ctx.arc(720, 520, 24, 0, Math.PI * 2);
        ctx.fill();

        if (cat.classList.contains("has-glasses")) {
          ctx.fillStyle = "rgba(12, 18, 28, 0.92)";
          ctx.strokeStyle = "#4b2418";
          ctx.lineWidth = 14;
          roundedRect(ctx, 405, 470, 155, 95, 25);
          ctx.fill();
          ctx.stroke();
          roundedRect(ctx, 640, 470, 155, 95, 25);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(560, 515);
          ctx.lineTo(640, 515);
          ctx.stroke();
        }

        ctx.fillStyle = "#4b2418";
        ctx.beginPath();
        ctx.ellipse(600, 620, 40, 30, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#4b2418";
        ctx.lineWidth = 16;
        ctx.beginPath();
        ctx.arc(600, 690, 75, 0, Math.PI);
        ctx.stroke();

        if (cat.classList.contains("tongue-out")) {
          ctx.fillStyle = "#ff6b9d";
          ctx.strokeStyle = "#4b2418";
          ctx.lineWidth = 8;
          roundedRect(ctx, 560, 700, 80, 120, 35);
          ctx.fill();
          ctx.stroke();
        }

        ctx.strokeStyle = "#4b2418";
        ctx.lineWidth = 10;
        [[310, 620, 470, 600], [310, 675, 470, 660], [730, 600, 890, 620], [730, 660, 890, 675]].forEach((line) => {
          ctx.beginPath();
          ctx.moveTo(line[0], line[1]);
          ctx.lineTo(line[2], line[3]);
          ctx.stroke();
        });

        if (cat.classList.contains("has-collar")) {
          ctx.fillStyle = "#66e89c";
          ctx.strokeStyle = "#4b2418";
          ctx.lineWidth = 12;
          roundedRect(ctx, 445, 780, 310, 65, 32);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#ffd166";
          ctx.beginPath();
          ctx.arc(600, 835, 34, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }

        if (cat.classList.contains("has-bow")) {
          ctx.fillStyle = "#ff6b9d";
          ctx.strokeStyle = "#4b2418";
          ctx.lineWidth = 10;
          roundedRect(ctx, 505, 740, 85, 70, 25);
          ctx.fill();
          ctx.stroke();
          roundedRect(ctx, 610, 740, 85, 70, 25);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#ffd166";
          ctx.beginPath();
          ctx.arc(600, 775, 26, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(255, 249, 239, 0.94)";
        ctx.strokeStyle = "#111827";
        ctx.lineWidth = 8;
        roundedRect(ctx, 720, 1085, 420, 70, 16);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#111827";
        ctx.font = "700 34px Arial";
        ctx.fillText("Made by Tennyson", 752, 1132);

        return canvas;
      }

      async function saveOrShareCat() {
        const canvas = drawCatPicture();
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        const file = new File([blob], "tennyson-cat.png", { type: "image/png" });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            title: "Tennyson cat",
            text: "Made by Tennyson",
            files: [file]
          });
          saveStatus.textContent = "Shared.";
          return;
        }

        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "tennyson-cat.png";
        link.click();
        URL.revokeObjectURL(link.href);
        saveStatus.textContent = "Saved as tennyson-cat.png.";
      }

      document.querySelector("[data-save]").addEventListener("click", async () => {
        try {
          await saveOrShareCat();
        } catch {
          saveStatus.textContent = "Could not share, so try the button again to save.";
        }
      });
    </script>
  </body>
</html>
