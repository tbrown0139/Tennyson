<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secret Cat Page</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #fff9ef;
        --night: #101622;
        --blue: #58c7ff;
        --pink: #ff6b9d;
        --gold: #ffd166;
        --green: #66e89c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: clamp(1rem, 3vw, 2rem);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(88, 199, 255, 0.32), transparent 18rem),
          radial-gradient(circle at 83% 79%, rgba(255, 107, 157, 0.24), transparent 18rem),
          linear-gradient(135deg, #101622 0%, #19142c 55%, #152018 100%);
        overflow-x: hidden;
      }

      .back {
        position: fixed;
        top: clamp(1rem, 3vw, 2rem);
        left: clamp(1rem, 3vw, 2rem);
        z-index: 3;
        color: #111827;
        background: var(--gold);
        border: 3px solid var(--ink);
        border-radius: 999px;
        padding: 0.72rem 1rem;
        font-family: "Arial Black", Impact, system-ui, sans-serif;
        font-size: 0.9rem;
        letter-spacing: 0;
        text-decoration: none;
        text-transform: uppercase;
        box-shadow: 0 0.45rem 0 rgba(0, 0, 0, 0.35);
      }

      main {
        width: min(94vw, 980px);
        padding-top: 4rem;
      }

      .login,
      .secret {
        border: 3px solid rgba(255, 255, 255, 0.88);
        background: rgba(9, 14, 26, 0.82);
        box-shadow: 0 1rem 0 rgba(0, 0, 0, 0.28);
      }

      .login {
        width: min(100%, 560px);
        margin: 0 auto;
        padding: clamp(1.1rem, 4vw, 2rem);
      }

      h1,
      h2 {
        margin: 0;
        font-family: Impact, Haettenschweiler, "Arial Black", system-ui, sans-serif;
        line-height: 0.9;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(3rem, 9vw, 6.4rem);
        text-shadow:
          0.04em 0.04em 0 var(--pink),
          -0.035em -0.02em 0 var(--blue);
      }

      .login p,
      .secret p {
        margin: 1rem 0 0;
        font-size: clamp(1rem, 2vw, 1.2rem);
        font-weight: 750;
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 0.8rem;
        margin-top: 1.3rem;
      }

      label {
        font-weight: 900;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 3.3rem;
        color: #111827;
        background: var(--ink);
        border: 3px solid var(--blue);
        border-radius: 0;
        padding: 0.75rem 0.9rem;
        font: inherit;
        font-size: 1.1rem;
        font-weight: 800;
      }

      button {
        width: fit-content;
        min-height: 3.2rem;
        color: #111827;
        background: var(--green);
        border: 3px solid var(--ink);
        border-radius: 999px;
        padding: 0.75rem 1.2rem;
        font-family: "Arial Black", Impact, system-ui, sans-serif;
        font-size: 1rem;
        letter-spacing: 0;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0.45rem 0 rgba(0, 0, 0, 0.35);
      }

      button:hover,
      button:focus-visible,
      .back:hover,
      .back:focus-visible {
        transform: translateY(-0.1rem);
      }

      .error {
        min-height: 1.5rem;
        color: #ff9bb7;
        font-weight: 900;
      }

      .secret {
        display: none;
        gap: clamp(1rem, 3vw, 2rem);
        grid-template-columns: minmax(0, 1fr) minmax(260px, 0.9fr);
        align-items: center;
        padding: clamp(1rem, 3vw, 2rem);
      }

      .unlocked .login {
        display: none;
      }

      .unlocked .secret {
        display: grid;
      }

      h2 {
        font-size: clamp(2.7rem, 7vw, 6rem);
        color: var(--gold);
      }

      .cat-frame {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 410px;
        perspective: 900px;
      }

      .cat-card {
        position: relative;
        width: min(82vw, 360px);
        aspect-ratio: 1 / 1;
        border: 0.7rem solid var(--ink);
        background:
          radial-gradient(circle at 50% 66%, #f7d8a7 0 15%, transparent 16%),
          radial-gradient(circle at 36% 43%, #ffdca9 0 7%, transparent 8%),
          radial-gradient(circle at 64% 43%, #ffdca9 0 7%, transparent 8%),
          radial-gradient(circle at 50% 46%, #d28a48 0 36%, #a95e33 37% 48%, transparent 49%),
          linear-gradient(145deg, #78ddff 0%, #ffe06b 100%);
        box-shadow: 0 1.4rem 3rem rgba(0, 0, 0, 0.42);
        transform: rotateX(var(--tilt-y, 0deg)) rotateY(var(--tilt-x, 0deg));
        transition: transform 120ms ease-out;
        cursor: pointer;
      }

      .cat-card:focus-visible {
        outline: 0.32rem solid var(--gold);
        outline-offset: 0.28rem;
      }

      .cat-card::before,
      .cat-card::after {
        content: "";
        position: absolute;
        top: 22%;
        width: 26%;
        aspect-ratio: 1;
        background: #a95e33;
        border: 0.25rem solid #5e321c;
        transform: rotate(45deg);
        z-index: 0;
      }

      .cat-card::before {
        left: 19%;
      }

      .cat-card::after {
        right: 19%;
      }

      .face {
        position: absolute;
        inset: 25% 15% 13%;
        border-radius: 50% 50% 42% 42%;
        background: #d28a48;
        border: 0.28rem solid #5e321c;
        z-index: 1;
      }

      .eye {
        position: absolute;
        top: 38%;
        width: 18%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #fff8db;
        border: 0.18rem solid #30180d;
        overflow: hidden;
      }

      .eye.left {
        left: 25%;
      }

      .eye.right {
        right: 25%;
      }

      .pupil {
        position: absolute;
        left: calc(50% + var(--eye-x, 0px));
        top: calc(50% + var(--eye-y, 0px));
        width: 42%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #101010;
        transform: translate(-50%, -50%);
      }

      .nose {
        position: absolute;
        left: 50%;
        top: 56%;
        width: 10%;
        aspect-ratio: 1.15 / 1;
        border-radius: 48% 48% 60% 60%;
        background: #4b2418;
        transform: translateX(-50%);
      }

      .mouth {
        position: absolute;
        left: 50%;
        top: 65%;
        width: 22%;
        height: 10%;
        border-bottom: 0.25rem solid #4b2418;
        border-radius: 0 0 999px 999px;
        transform: translateX(-50%);
      }

      .tongue {
        position: absolute;
        left: 50%;
        top: 71%;
        width: 13%;
        height: 0;
        border-radius: 0 0 999px 999px;
        background: #ff6b9d;
        border: 0 solid #4b2418;
        transform: translateX(-50%);
        transition: height 140ms ease-out, border-width 140ms ease-out;
      }

      .cat-card.tongue-out .tongue {
        height: 15%;
        border-width: 0 0.16rem 0.16rem;
      }

      .whisker {
        position: absolute;
        top: 59%;
        width: 27%;
        height: 0.18rem;
        background: #4b2418;
      }

      .whisker.left {
        left: 4%;
      }

      .whisker.right {
        right: 4%;
      }

      .whisker.top {
        margin-top: -0.6rem;
        transform: rotate(10deg);
      }

      .whisker.bottom {
        margin-top: 0.6rem;
        transform: rotate(-10deg);
      }

      .hint {
        position: absolute;
        bottom: -0.2rem;
        right: 0;
        left: 0;
        margin: 0 auto;
        width: fit-content;
        padding: 0.45rem 0.7rem;
        color: #111827;
        background: var(--ink);
        border: 2px solid #111827;
        font-weight: 900;
        text-transform: uppercase;
      }

      @media (max-width: 820px) {
        .secret {
          grid-template-columns: 1fr;
        }

        .cat-frame {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <a class="back" href="index.html">Back</a>
    <main>
      <section class="login" aria-labelledby="secret-title">
        <h1 id="secret-title">Secret page</h1>
        <p>Enter the secret password to unlock the surprise.</p>
        <form>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password">
          <button type="submit">Unlock</button>
          <div class="error" role="status" aria-live="polite"></div>
        </form>
      </section>

      <section class="secret" aria-labelledby="cat-title">
        <div>
          <h2 id="cat-title">You found the cat</h2>
        </div>
        <div class="cat-frame" aria-label="Interactive cat illustration">
          <div class="cat-card" tabindex="0" role="button" aria-label="Cat. Click to make it stick its tongue out.">
            <div class="face">
              <div class="eye left"><span class="pupil"></span></div>
              <div class="eye right"><span class="pupil"></span></div>
              <span class="nose"></span>
              <span class="mouth"></span>
              <span class="tongue"></span>
              <span class="whisker left top"></span>
              <span class="whisker left bottom"></span>
              <span class="whisker right top"></span>
              <span class="whisker right bottom"></span>
            </div>
          </div>
          <p class="hint">Click the cat</p>
        </div>
      </section>
    </main>
    <script>
      const page = document.body;
      const form = document.querySelector("form");
      const input = document.querySelector("#password");
      const error = document.querySelector(".error");
      const cat = document.querySelector(".cat-card");
      let tongueTimer;

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        if (input.value.trim().toLowerCase() === "cat") {
          page.classList.add("unlocked");
          error.textContent = "";
          return;
        }

        error.textContent = "That is not the secret password.";
        input.select();
      });

      window.addEventListener("pointermove", (event) => {
        if (!page.classList.contains("unlocked")) {
          return;
        }

        const box = cat.getBoundingClientRect();
        const centerX = box.left + box.width / 2;
        const centerY = box.top + box.height / 2;
        const x = (event.clientX - centerX) / box.width;
        const y = (event.clientY - centerY) / box.height;
        const eyeX = Math.max(-8, Math.min(8, x * 18));
        const eyeY = Math.max(-7, Math.min(7, y * 18));

        cat.style.setProperty("--tilt-x", `${Math.max(-10, Math.min(10, x * 16))}deg`);
        cat.style.setProperty("--tilt-y", `${Math.max(-8, Math.min(8, y * -12))}deg`);
        cat.style.setProperty("--eye-x", `${eyeX}px`);
        cat.style.setProperty("--eye-y", `${eyeY}px`);
      });

      function hideTongue() {
        cat.classList.remove("tongue-out");
        window.clearTimeout(tongueTimer);
      }

      function toggleTongue() {
        if (cat.classList.contains("tongue-out")) {
          hideTongue();
          return;
        }

        cat.classList.add("tongue-out");
        window.clearTimeout(tongueTimer);
        tongueTimer = window.setTimeout(hideTongue, 900);
      }

      cat.addEventListener("click", toggleTongue);
      cat.addEventListener("mouseleave", hideTongue);
      cat.addEventListener("blur", hideTongue);

      cat.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }

        event.preventDefault();
        toggleTongue();
      });
    </script>
  </body>
</html>
