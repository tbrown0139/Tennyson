<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tennyson Avatar Creator</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #fffaf0;
        --night: #111827;
        --blue: #4cc9f0;
        --green: #72ef92;
        --pink: #ff70a6;
        --gold: #ffd166;
        --shirt: #4cc9f0;
        --hat: #ffd166;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          radial-gradient(circle at 16% 20%, rgba(76, 201, 240, 0.32), transparent 18rem),
          radial-gradient(circle at 84% 75%, rgba(114, 239, 146, 0.24), transparent 18rem),
          linear-gradient(135deg, #111827 0%, #221338 55%, #102018 100%);
        background-size: 40px 40px, 40px 40px, auto, auto, auto;
      }

      .back {
        position: fixed;
        top: clamp(1rem, 3vw, 2rem);
        left: clamp(1rem, 3vw, 2rem);
        z-index: 4;
      }

      main {
        width: min(94vw, 1120px);
        margin: 0 auto;
        padding: clamp(5.5rem, 10vw, 7rem) 0 clamp(1rem, 3vw, 2rem);
        display: grid;
        gap: 1rem;
      }

      h1,
      h2 {
        margin: 0;
        font-family: Impact, Haettenschweiler, "Arial Black", system-ui, sans-serif;
        line-height: 0.9;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(3.8rem, 13vw, 10rem);
        text-shadow:
          0.035em 0.035em 0 var(--pink),
          -0.035em -0.025em 0 var(--blue);
      }

      h2 {
        color: var(--gold);
        font-size: clamp(1.8rem, 4vw, 3rem);
      }

      p {
        margin: 0;
        font-weight: 850;
        line-height: 1.45;
      }

      button,
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.8rem;
        color: #111827;
        background: var(--gold);
        border: 3px solid var(--ink);
        border-radius: 999px;
        padding: 0.7rem 1rem;
        font-family: "Arial Black", Impact, system-ui, sans-serif;
        font-size: 0.95rem;
        letter-spacing: 0;
        text-decoration: none;
        text-transform: uppercase;
        box-shadow: 0 0.45rem 0 rgba(0, 0, 0, 0.36);
        cursor: pointer;
      }

      button:hover,
      button:focus-visible,
      a:hover,
      a:focus-visible {
        transform: translateY(-0.1rem);
      }

      .creator {
        display: grid;
        grid-template-columns: minmax(280px, 0.85fr) minmax(0, 1fr);
        gap: 1rem;
        align-items: start;
      }

      .stage,
      .panel {
        border: 3px solid rgba(255, 255, 255, 0.86);
        background: rgba(11, 18, 32, 0.84);
        box-shadow: 0 0.8rem 0 rgba(0, 0, 0, 0.28);
      }

      .stage {
        display: grid;
        place-items: center;
        gap: 1rem;
        padding: clamp(1rem, 3vw, 2rem);
      }

      .avatar {
        position: relative;
        width: min(78vw, 320px);
        aspect-ratio: 0.78 / 1;
      }

      .head {
        position: absolute;
        left: 50%;
        top: 5%;
        width: 46%;
        aspect-ratio: 1;
        border-radius: 12%;
        background: #ffdca8;
        border: 0.28rem solid #111827;
        transform: translateX(-50%);
        z-index: 2;
      }

      .hair,
      .hat {
        position: absolute;
        left: 50%;
        z-index: 3;
        transform: translateX(-50%);
      }

      .hair {
        top: 1%;
        width: 48%;
        height: 15%;
        border-radius: 50% 50% 10% 10%;
        background: #4b2a17;
      }

      .hat {
        display: none;
        top: -1%;
        width: 58%;
        height: 13%;
        border-radius: 999px 999px 18% 18%;
        background: var(--hat);
        border: 0.24rem solid #111827;
      }

      .avatar.has-hat .hat {
        display: block;
      }

      .eye,
      .mouth {
        position: absolute;
        background: #111827;
      }

      .eye {
        top: 42%;
        width: 12%;
        aspect-ratio: 1;
        border-radius: 50%;
      }

      .eye.left {
        left: 27%;
      }

      .eye.right {
        right: 27%;
      }

      .mouth {
        left: 50%;
        top: 66%;
        width: 28%;
        height: 8%;
        border-radius: 0 0 999px 999px;
        transform: translateX(-50%);
      }

      .avatar.serious .mouth {
        height: 0.24rem;
        border-radius: 0;
      }

      .avatar.star .eye {
        border-radius: 0;
        transform: rotate(45deg);
      }

      .body {
        position: absolute;
        left: 50%;
        top: 42%;
        width: 62%;
        height: 38%;
        background: var(--shirt);
        border: 0.3rem solid #111827;
        transform: translateX(-50%);
      }

      .arm,
      .leg {
        position: absolute;
        background: #ffdca8;
        border: 0.25rem solid #111827;
      }

      .arm {
        top: 45%;
        width: 16%;
        height: 33%;
      }

      .arm.left {
        left: 3%;
        transform: rotate(7deg);
      }

      .arm.right {
        right: 3%;
        transform: rotate(-7deg);
      }

      .leg {
        top: 78%;
        width: 23%;
        height: 18%;
        background: #2f4369;
      }

      .leg.left {
        left: 25%;
      }

      .leg.right {
        right: 25%;
      }

      .nameplate {
        width: min(100%, 420px);
        padding: 0.8rem 1rem;
        color: #111827;
        background: var(--ink);
        border: 3px solid #111827;
        font-family: Impact, Haettenschweiler, "Arial Black", system-ui, sans-serif;
        font-size: clamp(1.5rem, 4vw, 2.6rem);
        line-height: 1;
        text-align: center;
        text-transform: uppercase;
      }

      .panel {
        display: grid;
        gap: 1rem;
        padding: clamp(1rem, 2.5vw, 1.4rem);
      }

      .group {
        display: grid;
        gap: 0.6rem;
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      .swatch {
        width: 3rem;
        min-height: 3rem;
        padding: 0;
        border-radius: 50%;
        background: var(--swatch);
      }

      @media (max-width: 860px) {
        .creator {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <a class="back" href="index.html">Back</a>
    <main>
      <section>
        <h1>Avatar creator</h1>
        <p>Build a Tennyson Roblox-style avatar with colors, hats, faces, and titles.</p>
      </section>

      <section class="creator">
        <div class="stage" aria-label="Avatar preview">
          <div class="avatar" id="avatar">
            <span class="hat"></span>
            <span class="hair"></span>
            <div class="head">
              <span class="eye left"></span>
              <span class="eye right"></span>
              <span class="mouth"></span>
            </div>
            <span class="body"></span>
            <span class="arm left"></span>
            <span class="arm right"></span>
            <span class="leg left"></span>
            <span class="leg right"></span>
          </div>
          <div class="nameplate" id="title">Obby champion</div>
        </div>

        <div class="panel">
          <div class="group">
            <h2>Shirt color</h2>
            <div class="buttons" aria-label="Shirt colors">
              <button class="swatch" style="--swatch: #4cc9f0" type="button" data-shirt="#4cc9f0" aria-label="Blue shirt"></button>
              <button class="swatch" style="--swatch: #72ef92" type="button" data-shirt="#72ef92" aria-label="Green shirt"></button>
              <button class="swatch" style="--swatch: #ff70a6" type="button" data-shirt="#ff70a6" aria-label="Pink shirt"></button>
              <button class="swatch" style="--swatch: #ffd166" type="button" data-shirt="#ffd166" aria-label="Gold shirt"></button>
            </div>
          </div>

          <div class="group">
            <h2>Hat</h2>
            <div class="buttons">
              <button type="button" data-hat="on">Hat on</button>
              <button type="button" data-hat="off">Hat off</button>
              <button class="swatch" style="--swatch: #ffd166" type="button" data-hat-color="#ffd166" aria-label="Gold hat"></button>
              <button class="swatch" style="--swatch: #ff70a6" type="button" data-hat-color="#ff70a6" aria-label="Pink hat"></button>
            </div>
          </div>

          <div class="group">
            <h2>Face</h2>
            <div class="buttons">
              <button type="button" data-face="happy">Happy</button>
              <button type="button" data-face="serious">Serious</button>
              <button type="button" data-face="star">Star eyes</button>
            </div>
          </div>

          <div class="group">
            <h2>Title</h2>
            <div class="buttons">
              <button type="button" data-title="Obby champion">Obby champion</button>
              <button type="button" data-title="Knovon researcher">Knovon researcher</button>
              <button type="button" data-title="Roblox legend">Roblox legend</button>
              <button type="button" data-title="Strategy boss">Strategy boss</button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script>
      const root = document.documentElement;
      const avatar = document.querySelector("#avatar");
      const title = document.querySelector("#title");

      document.querySelectorAll("[data-shirt]").forEach((button) => {
        button.addEventListener("click", () => {
          root.style.setProperty("--shirt", button.dataset.shirt);
        });
      });

      document.querySelectorAll("[data-hat]").forEach((button) => {
        button.addEventListener("click", () => {
          avatar.classList.toggle("has-hat", button.dataset.hat === "on");
        });
      });

      document.querySelectorAll("[data-hat-color]").forEach((button) => {
        button.addEventListener("click", () => {
          root.style.setProperty("--hat", button.dataset.hatColor);
          avatar.classList.add("has-hat");
        });
      });

      document.querySelectorAll("[data-face]").forEach((button) => {
        button.addEventListener("click", () => {
          avatar.classList.remove("serious", "star");
          if (button.dataset.face !== "happy") {
            avatar.classList.add(button.dataset.face);
          }
        });
      });

      document.querySelectorAll("[data-title]").forEach((button) => {
        button.addEventListener("click", () => {
          title.textContent = button.dataset.title;
        });
      });
    </script>
  </body>
</html>
